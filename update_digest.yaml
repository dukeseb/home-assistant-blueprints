blueprint:
  name: Daily Update Digest
  description: Checks for any pending updates at a specific time and sends a notification.
  domain: automation
  source_url: https://raw.githubusercontent.com/dukeseb/home-assistant-blueprints/refs/heads/main/update_digest.yaml
  input:
    notification_time:
      name: Notification Time
      description: What time should the check run?
      default: "09:00:00"
      selector:
        time: {}
    notify_device:
      name: Notification Device
      description: The device to receive the update alert.
      selector:
        device:
          filter:
            - integration: mobile_app

mode: single

trigger:
  - platform: time
    at: !input notification_time

condition:
  - condition: template
    value_template: "{{ states.update | selectattr('state', 'eq', 'on') | list | count > 0 }}"

action:
  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: "Updates Available"
    message: >
      {% set updates = states.update | selectattr('state', 'eq', 'on') |
      map(attribute='name') | list %} There are {{ updates | count }} updates
      waiting: {{ updates | join(', ') }}
    data:
      clickAction: /config/updates
      tag: daily-update-summary
